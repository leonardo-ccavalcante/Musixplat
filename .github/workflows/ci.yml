name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest

    # Lightweight Postgres service (GitHub's Docker Hub mirror — no ECR rate limits, no full
    # Supabase stack). Tests connect via direct pg (resetDb truncate+seed), not the Supabase CLI.
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      JWT_SECRET: ci-only-test-secret

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0 # pinned exact (matches local dev + lockfile 9.0); floating `11` grabbed 11.8.0 which EACCES'd in CI
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          # cache: pnpm removed — the restored pnpm store hit EACCES (exit 236) during reuse/hardlink
          # on the runner (fails on pinned 11.7.0 too, so not the pnpm version). Fresh install instead.
      - run: pnpm install --frozen-lockfile

      # Static + unit gates (no DB).
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

      # DB-backed gates: apply schema to the postgres service, then run the §14 anti-fake gate
      # and the integration suite (producers determinism + k-anon/n_min boundaries + anti-mezcla
      # + handoff RLS/idempotency/cross-pool + sandbox no-commit).
      - run: pnpm db:migrate
      - run: pnpm test:antifake
      - run: pnpm test:integration

      # NOTE: pgTAP (`pnpm test:sql`) runs locally against the Supabase stack (which ships pgtap).
      # Its assertions (determinism, k-anon/n_min boundaries, anti-mezcla) are mirrored in the
      # integration suite above, so the CI gate keeps full coverage without the heavy stack.
