# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# ESLint is a tool for identifying and reporting on patterns
# found in ECMAScript/JavaScript code.
# More details at https://github.com/eslint/eslint
# and https://eslint.org

name: ESLint

on:
  push:
    branches: [ "main" ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ "main" ]
  schedule:
    - cron: '17 23 * * 4'

jobs:
  eslint:
    name: Run eslint scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Install the project (eslint@9 + the flat-config plugins it imports: typescript-eslint, @eslint/js,
      # globals) + the SARIF formatter. The previous starter step hardcoded `npm install eslint@8.10.0`,
      # which ERESOLVE-conflicted with typescript-eslint@8.x (needs eslint >=8.57/9) and never installed
      # the flat-config plugins.
      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          pnpm add -D @microsoft/eslint-formatter-sarif@3.1.0

      # eslint@9 flat config (eslint.config.js, auto-discovered). No --ext / --config .eslintrc.js
      # (eslint-8 only; this repo has no .eslintrc and removed --ext in eslint 9).
      - name: Run ESLint
        env:
          SARIF_ESLINT_IGNORE_SUPPRESSED: "true"
        run: pnpm exec eslint . --format @microsoft/eslint-formatter-sarif --output-file eslint-results.sarif
        continue-on-error: true

      - name: Upload analysis results to GitHub
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: eslint-results.sarif
          wait-for-processing: true
